name: Flash
id: flash
description: Text flashes 3 times then holds steady — grabs attention
best_for: Critical alerts, errors, urgent notifications

animation:
  type: flash-hold
  flash_count: 3
  flash_on: 0.08    # seconds visible
  flash_off: 0.08   # seconds hidden
  gap: 0.1          # gap between flashes
  hold: true        # stay visible after flashing

typography:
  font: monospaced
  size: 12
  weight: heavy

color:
  mode: severity
  glow: false

example:
  banner: "🔴 CRITICAL ⚡ auth-service DOWN ⚡ rollback?"
