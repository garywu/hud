name: Split-Flap
id: split-flap
description: Airport departure board — characters flip through random letters before settling
best_for: Status changes, schedule updates, retro/mechanical aesthetic

animation:
  type: cascade-reveal
  flip_count: 3-6     # random flips per character before settling
  flip_interval: 0.06 # seconds per flip
  cascade_delay: 0.04 # delay between each character position (left to right)
  hold: 4.0           # seconds to hold after all settled
  loop: true

typography:
  font: monospaced
  size: 12
  weight: heavy

color:
  mode: severity
  unsettled_opacity: 0.4   # opacity while flipping
  settled_opacity: 1.0     # opacity when settled

example:
  banner: "GATE B12 ★ BOARDING ★ SFO TO NRT ★ ON TIME"
